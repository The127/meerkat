services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: meerkat
      POSTGRES_PASSWORD: meerkat
      POSTGRES_DB: meerkat
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pigeon"]
      interval: 2s
      timeout: 5s
      retries: 15

volumes:
  pgdata:
